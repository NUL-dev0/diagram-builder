name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-mac:
    name: Build & Release (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build & publish
        run: npm run electron:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

  release-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build (Windows)
        run: |
          npx next build
          xcopy /E /I .next\static .next\standalone\.next\static
          xcopy /E /I public .next\standalone\public
          cd backend && npm run build && cd ..
          npm run electron:compile
          npx electron-builder --publish never
        shell: cmd

      - name: Upload to GitHub Release
        run: |
          $exe = Get-ChildItem -Path dist-electron -Filter "*.exe" | Select-Object -First 1
          gh release upload $env:GITHUB_REF_NAME $exe.FullName --clobber
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
