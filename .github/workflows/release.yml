name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-mac:
    name: Build & Release (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build & publish
        run: npm run electron:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

  release-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build (Windows)
        shell: pwsh
        run: |
          npx next build
          if (!(Test-Path ".next\standalone\.next\static")) { New-Item -ItemType Directory -Force ".next\standalone\.next\static" }
          Copy-Item -Recurse -Force ".next\static\*" ".next\standalone\.next\static\"
          if (!(Test-Path ".next\standalone\public")) { New-Item -ItemType Directory -Force ".next\standalone\public" }
          Copy-Item -Recurse -Force "public\*" ".next\standalone\public\"
          cd backend; npm run build; cd ..
          npm run electron:compile
          npx electron-builder --publish never

      - name: Debug - list output
        shell: pwsh
        run: |
          Write-Host "=== Working directory ==="
          Get-ChildItem -Path . -Directory | Select-Object Name
          Write-Host "=== Searching for .exe ==="
          Get-ChildItem -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object FullName

      - name: Upload to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem -Recurse -Filter "*.exe" | Where-Object { $_.DirectoryName -notlike "*node_modules*" } | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found"; exit 1 }
          Write-Host "Uploading: $($exe.FullName)"
          gh release upload $env:GITHUB_REF_NAME $exe.FullName --clobber
